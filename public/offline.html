<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FinTrack - Offline</title>
    <style>
      :root {
        color-scheme: light dark;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: radial-gradient(circle at top, #4f46e515, transparent 65%), #0b1020;
        color: #f8fafc;
      }
      .card {
        width: min(92vw, 420px);
        border-radius: 18px;
        border: 1px solid rgba(255, 255, 255, 0.15);
        background: rgba(15, 23, 42, 0.75);
        backdrop-filter: blur(6px);
        padding: 24px;
      }
      h1 {
        margin: 0 0 8px;
        font-size: 1.15rem;
      }
      p {
        margin: 0;
        color: rgba(248, 250, 252, 0.8);
        line-height: 1.5;
      }
      button {
        margin-top: 16px;
        border: 0;
        border-radius: 12px;
        padding: 10px 14px;
        font-weight: 600;
        cursor: pointer;
        background: #4f46e5;
        color: #fff;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Kamu lagi offline 📡</h1>
      <p>
        Data terbaru belum bisa diambil sekarang. Begitu koneksi balik, FinTrack bakal sinkron lagi otomatis.
      </p>
      <button onclick="window.location.reload()">Coba lagi</button>
    </div>
  </body>
</html>
